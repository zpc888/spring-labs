server:
  port: 8081

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: app1-route
          uri: http://localhost:8082
          predicates:
            - Path=/app1/**
          filters:
            - StripPrefix=1
        - id: app2-route
          uri: http://localhost:8083
          predicates:
            - Path=/app2/**
          filters:
            - StripPrefix=1
        - id: tenant-app2-route
          uri: http://localhost:8083
          predicates:
            - Path=/tenant/app2/**
            - TenantHeader=gold
          filters:
            - StripPrefix=2
            - RequestTiming=X-Latency-Ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
